<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Sát Hạch An Toàn Điện - VSIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vsip-blue: #004a99;
            --vsip-orange: #f37021;
            --bg-light: #f8f9fa;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 600px;
            border-top: 6px solid var(--vsip-blue);
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .header h1 {
            color: var(--vsip-blue);
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .header p {
            color: #666;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #333;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            background-color: white;
            transition: border-color 0.3s;
            cursor: pointer;
        }

        select:focus {
            outline: none;
            border-color: var(--vsip-blue);
        }

        #chuyenDeSection {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-start {
            width: 100%;
            padding: 14px;
            background-color: var(--vsip-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        .btn-start:hover {
            background-color: #003366;
        }

        .version {
            text-align: right;
            font-size: 11px;
            color: #ccc;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Sát hạch An toàn điện 2026</h1>
        <p>Hệ thống ôn tập và kiểm tra trực tuyến</p>
    </div>

    <form id="selectionForm">
        <div class="form-group">
            <label for="bacAnToan">1. Chọn bậc an toàn điện:</label>
            <select id="bacAnToan" required>
                <option value="" disabled selected>-- Chọn bậc --</option>
                <option value="1/5">Bậc 1/5</option>
                <option value="2/5">Bậc 2/5</option>
                <option value="3/5">Bậc 3/5</option>
                <option value="4/5">Bậc 4/5</option>
                <option value="5/5">Bậc 5/5</option>
            </select>
        </div>

        <div id="chuyenDeSection" class="form-group">
            <label for="chuyenDe">2. Chọn chuyên đề đào tạo:</label>
            <select id="chuyenDe">
                <option value="0" selected>-- Tất cả chuyên đề --</option>
                <option value="1">Chuyên đề 1: Trạm biến áp 110/22kV</option>
                <option value="2">Chuyên đề 2: Đường dây dẫn điện 110kV/22kV/0.4kV</option>
                <option value="3">Chuyên đề 3: Hệ thống điện mặt trời áp mái (Rooftop Solar)</option>
                <option value="4">Chuyên đề 4: Hệ thống lưu trữ năng lượng pin (BESS)</option>
                <option value="5">Chuyên đề 5: Thiết bị điện hạ thế văn phòng VSIP</option>
                <option value="6">Chuyên đề 6: Hệ thống SCADA và OCC</option>
                <option value="7">Chuyên đề 7: Nhà máy điện áp đến 22kV</option>
                <option value="8">Chuyên đề 8: Nhà máy xử lý nước thải</option>
                <option value="9">Chuyên đề 9: Nhà xưởng xây sẵn (Hạ tầng & PCCC)</option>
                <option value="10">Chuyên đề 10: Thi công xây dựng & Nhà ở thấp tầng</option>
            </select>
        </div>

        <button type="submit" class="btn-start">BẮT ĐẦU LÀM BÀI</button>
    </form>

    <div class="version">Phiên bản 1.0 | 06/03/2026</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo",
        authDomain: "tavietnam-78ae8.firebaseapp.com",
        projectId: "tavietnam-78ae8",
        storageBucket: "tavietnam-78ae8.firebasestorage.app",
        messagingSenderId: "670121705534",
        appId: "1:670121705534:web:1027ad98550573ad37116f"
    };

    const app = initializeApp(firebaseConfig);

    const bacAnToanSelect = document.getElementById('bacAnToan');
    const chuyenDeSection = document.getElementById('chuyenDeSection');
    const form = document.getElementById('selectionForm');

    // Logic ẩn hiện chuyên đề
    bacAnToanSelect.addEventListener('change', function() {
        const value = this.value;
        if (value === '3/5' || value === '4/5' || value === '5/5') {
            chuyenDeSection.style.display = 'block';
        } else {
            chuyenDeSection.style.display = 'none';
            document.getElementById('chuyenDe').value = "0"; // Reset về mặc định
        }
    });

    // Xử lý gửi form
    form.addEventListener('submit', function(e) {
        e.preventDefault();
        const bac = bacAnToanSelect.value;
        const cd = document.getElementById('chuyenDe').value;
        
        // Chuyển hướng sang trang làm bài (ví dụ test.html)
        // Truyền tham số qua URL
        window.location.href = `test.html?level=${encodeURIComponent(bac)}&topic=${cd}`;
    });
</script>

</body>
</html>
