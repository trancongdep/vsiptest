<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sát hạch An toàn điện VSIP - v2.1</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #0056b3; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid var(--primary); margin-bottom: 20px; }
        .setup-box { background: #e9ecef; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        select, button { padding: 12px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin: 5px 0; width: 100%; }
        button { background: var(--primary); color: white; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { opacity: 0.9; }
        .question-card { display: none; margin-top: 20px; padding: 15px; border-left: 5px solid var(--primary); background: #fafafa; }
        .options-list { list-style: none; padding: 0; }
        .option-item { padding: 10px; border: 1px solid #ddd; margin: 5px 0; border-radius: 4px; cursor: pointer; }
        .option-item:hover { background: #f1f1f1; }
        .option-item.selected { background: #cce5ff; border-color: #b8daff; }
        #result-box { display: none; text-align: center; padding: 20px; }
        .score { font-size: 48px; font-weight: bold; color: var(--success); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>HỆ THỐNG SÁT HẠCH AN TOÀN ĐIỆN 2026</h2>
        <p>Đơn vị: VSIP - HUẤN LUYỆN VÀ CHIA SẺ</p>
    </div>

    <div id="setup" class="setup-box">
        <label><b>1. Chọn Bậc an toàn của anh:</b></label>
        <select id="level">
            <option value="1">Bậc 1/5</option>
            <option value="2">Bậc 2/5</option>
            <option value="3">Bậc 3/5</option>
            <option value="4">Bậc 4/5</option>
            <option value="5">Bậc 5/5</option>
        </select>

        <label><b>2. Chọn Nhóm ngành công tác:</b></label>
        <select id="sector">
            <option value="110kV">Vận hành TBA 110kV</option>
            <option value="22kV">Vận hành ĐZ & TBA 22kV</option>
            <option value="Hate">Hạ thế Khách hàng</option>
            <option value="Chieusang">Hệ thống chiếu sáng</option>
            <option value="Vanphong">Hệ thống điện văn phòng</option>
            <option value="Solar">Solar áp mái</option>
            <option value="BESS">Lưu trữ năng lượng BESS</option>
        </select>
        
        <button onclick="startExam()">BẮT ĐẦU LÀM BÀI (50 CÂU)</button>
    </div>

    <div id="quiz-area">
        <div id="progress"></div>
        <div id="question-container"></div>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="prevBtn" style="display:none;" onclick="changeQuestion(-1)">Câu trước</button>
            <button id="nextBtn" style="display:none;" onclick="changeQuestion(1)">Câu tiếp theo</button>
            <button id="submitBtn" style="display:none; background: var(--success);" onclick="showResult()">NỘP BÀI</button>
        </div>
    </div>

    <div id="result-box">
        <h3>KẾT QUẢ SÁT HẠCH</h3>
        <div class="score" id="final-score">0/50</div>
        <p id="evaluation"></p>
        <button onclick="location.reload()">LÀM LẠI BÀI MỚI</button>
    </div>
</div>

<script>
    // Firebase Config (Dữ liệu của anh Trần Công Đẹp)
    const firebaseConfig = {
        apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo",
        authDomain: "tavietnam-78ae8.firebaseapp.com",
        projectId: "tavietnam-78ae8",
        storageBucket: "tavietnam-78ae8.firebasestorage.app",
        messagingSenderId: "670121705534",
        appId: "1:670121705534:web:1027ad98550573ad37116f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let allQuestions = [];
    let currentIdx = 0;
    let userAnswers = {};

    async function startExam() {
        const lvl = document.getElementById('level').value;
        const sec = document.getElementById('sector').value;
        
        document.getElementById('setup').style.display = 'none';
        document.getElementById('question-container').innerHTML = "Đang tải bộ đề...";

        const snapshot = await db.ref('bank_questions/bac_' + lvl).once('value');
        const data = snapshot.val();

        if(!data) {
            alert("Chưa có dữ liệu cho bậc này. Vui lòng nạp dữ liệu từ App Admin.");
            location.reload();
            return;
        }

        // Chuyển object thành array và lọc theo ngành (giả sử trong nội dung hoặc tag có chứa từ khóa ngành)
        // Lưu ý: Logic này sẽ ưu tiên các câu có từ khóa liên quan đến ngành đã chọn
        let pool = Object.values(data);
        let filtered = pool.filter(q => 
            q.content.toLowerCase().includes(sec.toLowerCase()) || 
            (q.tags && q.tags.includes(sec))
        );

        // Nếu không đủ 50 câu ngành đó, lấy thêm các câu khác của cùng bậc cho đủ 50
        if(filtered.length < 50) {
            let remain = pool.filter(q => !filtered.includes(q));
            filtered = filtered.concat(remain.sort(() => 0.5 - Math.random()).slice(0, 50 - filtered.length));
        }

        allQuestions = filtered.sort(() => 0.5 - Math.random()).slice(0, 50);
        renderQuestion();
    }

    function renderQuestion() {
        const q = allQuestions[currentIdx];
        let html = `
            <div class="question-card" style="display:block;">
                <p><b>Câu ${currentIdx + 1}/50:</b> ${q.content}</p>
                <div class="options-list">
                    ${Object.entries(q.options).map(([key, val]) => `
                        <div class="option-item ${userAnswers[currentIdx] === key ? 'selected' : ''}" 
                             onclick="selectOption('${key}')">
                            ${key}. ${val}
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
        document.getElementById('question-container').innerHTML = html;
        document.getElementById('prevBtn').style.display = currentIdx > 0 ? 'block' : 'none';
        document.getElementById('nextBtn').style.display = currentIdx < 49 ? 'block' : 'none';
        document.getElementById('submitBtn').style.display = currentIdx === 49 ? 'block' : 'none';
    }

    function selectOption(key) {
        userAnswers[currentIdx] = key;
        renderQuestion();
    }

    function changeQuestion(step) {
        currentIdx += step;
        renderQuestion();
    }

    function showResult() {
        let score = 0;
        allQuestions.forEach((q, idx) => {
            if(userAnswers[idx] === q.answer) score++;
        });

        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('final-score').innerText = score + "/50";
        
        const percent = (score / 50) * 100;
        const eval = document.getElementById('evaluation');
        if(percent >= 80) {
            eval.innerHTML = "<b style='color:green;'>ĐẠT.</b> Chúc mừng anh đã hoàn thành sát hạch.";
        } else {
            eval.innerHTML = "<b style='color:red;'>CHƯA ĐẠT.</b> Anh cần đạt tối thiểu 40/50 câu (80%).";
        }
    }
</script>
</body>
</html>
