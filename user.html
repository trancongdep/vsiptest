<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý người dùng - VSIP 2026</title>
    <style>
        :root { --primary: #004a99; --accent: #f37021; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .container { flex: 1; max-width: 900px; margin: 20px auto; padding: 0 15px; width: 100%; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; border-bottom: 2px solid #eee; color: var(--primary); }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .admin { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; }
        .user { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
        .btn-toggle { padding: 6px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }
        footer { background: #eef2f6; padding: 20px; text-align: center; font-size: 0.9rem; border-top: 3px solid var(--primary); }
    </style>
</head>
<body>

<header><h1>QUẢN LÝ QUYỀN HỆ THỐNG</h1></header>

<div class="container">
    <div id="admin-check" style="text-align:center; padding:50px; display:none;">
        <h3>Bạn không có quyền truy cập trang này!</h3>
        <button onclick="location.href='index.html'" style="padding:10px 20px; background:var(--primary); color:white; border:none; border-radius:5px;">Về trang chủ</button>
    </div>

    <div id="main-content" style="display:none">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="color:var(--primary); margin:0;">Danh sách nhân sự</h2>
                <button onclick="loadUsers()" style="background:var(--primary); color:white; border:none; padding:8px 15px; border-radius:5px; cursor:pointer;">Làm mới</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Họ tên & Bộ phận</th>
                        <th>Email</th>
                        <th style="width:100px">Quyền</th>
                        <th style="width:120px">Thao tác</th>
                    </tr>
                </thead>
                <tbody id="user-body"></tbody>
            </table>
        </div>
    </div>
</div>

<footer>Nhóm biên soạn bộ đề An toàn điện VDC @2026</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo",
        authDomain: "tavietnam-78ae8.firebaseapp.com",
        projectId: "tavietnam-78ae8",
        storageBucket: "tavietnam-78ae8.firebasestorage.app",
        messagingSenderId: "670121705534",
        appId: "1:670121705534:web:1027ad98550573ad37116f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const MASTER_ADMIN = "deptc.gvatvsld@gmail.com";

    onAuthStateChanged(auth, (user) => {
        if (user && user.email === MASTER_ADMIN) {
            document.getElementById('main-content').style.display = 'block';
            loadUsers();
        } else {
            document.getElementById('admin-check').style.display = 'block';
        }
    });

    async function loadUsers() {
        const body = document.getElementById('user-body');
        body.innerHTML = '<tr><td colspan="4" style="text-align:center">Đang tải...</td></tr>';
        
        try {
            const snap = await getDocs(query(collection(db, "users"), orderBy("updatedAt", "desc")));
            body.innerHTML = '';
            snap.forEach(s => {
                const d = s.data();
                const isAdmin = d.role === 'admin';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${d.fullName}</strong><br><small>${d.department}</small></td>
                    <td>${d.email}</td>
                    <td><span class="badge ${isAdmin ? 'admin' : 'user'}">${isAdmin ? 'ADMIN' : 'USER'}</span></td>
                    <td>
                        <button class="btn-toggle" style="background:${isAdmin ? '#666' : 'var(--accent)'}; color:white;" 
                                onclick="toggleRole('${s.id}', '${d.role}')">
                            ${isAdmin ? 'Hạ quyền' : 'Nâng Admin'}
                        </button>
                    </td>
                `;
                body.appendChild(row);
            });
        } catch (e) { body.innerHTML = 'Lỗi: ' + e.message; }
    }

    window.toggleRole = async (uid, currentRole) => {
        const newRole = currentRole === 'admin' ? 'user' : 'admin';
        if (confirm(`Xác nhận đổi quyền thành ${newRole}?`)) {
            await updateDoc(doc(db, "users", uid), { role: newRole });
            loadUsers();
        }
    }
</script>
</body>
</html>
