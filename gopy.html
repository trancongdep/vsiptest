<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử Góp ý - VSIP 2026</title>
    <style>
        :root { --primary: #004a99; --accent: #f37021; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .container { flex: 1; max-width: 1000px; margin: 25px auto; padding: 0 15px; width: 100%; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .role-badge { display: inline-block; padding: 4px 12px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; }
        .admin-mode { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39e; }
        .user-mode { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #f8f9fa; color: var(--primary); border-bottom: 2px solid #eee; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: top; font-size: 0.9rem; }
        .q-box { background: #f0f7ff; padding: 8px; border-radius: 4px; font-size: 0.8rem; color: #555; margin-top: 5px; border-left: 3px solid var(--primary); }
        
        #auth-section { text-align: center; padding: 100px 20px; }
        .btn-google { background: white; border: 1px solid #ddd; padding: 12px 25px; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 10px; font-weight: bold; }
        footer { background: #eef2f6; padding: 20px; text-align: center; font-size: 0.9rem; border-top: 3px solid var(--primary); margin-top: auto; }
    </style>
</head>
<body>

<header><h1>LỊCH SỬ GÓP Ý CẢI TIẾN</h1></header>

<div class="container">
    <div id="auth-section">
        <p>Vui lòng đăng nhập để xem lịch sử góp ý của anh/chị.</p>
        <button class="btn-google" id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20"> Đăng nhập với Google
        </button>
    </div>

    <div id="main-content" style="display:none">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div id="role-display"></div>
                <button onclick="location.href='index.html'" style="background:none; border:none; color:var(--primary); cursor:pointer; font-weight:bold;">« Về trang chủ</button>
            </div>
            
            <h2 id="title-text" style="color:var(--primary); margin-top:10px;">Đang tải dữ liệu...</h2>
            
            <div id="table-area" style="overflow-x:auto">
                <table>
                    <thead>
                        <tr>
                            <th id="col-sender" style="width:150px">Người gửi</th>
                            <th>Nội dung góp ý</th>
                            <th style="width:150px">Thời gian</th>
                        </tr>
                    </thead>
                    <tbody id="data-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer>
    <div>Nhóm biên soạn bộ đề trắc nghiệm An toàn điện VDC @2026</div>
    <div style="font-weight:600; color:var(--primary); margin-top:5px;">Liên hệ: Trần Công Đẹp - Phone: 0963.292.882</div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBPNk4J9npcClKFD0daia4W8nPwwg3bX_A",
        authDomain: "vsiptest-bdbc5.firebaseapp.com",
        projectId: "vsiptest-bdbc5",
        storageBucket: "vsiptest-bdbc5.firebasestorage.app",
        messagingSenderId: "1056019256354",
        appId: "1:1056019256354:web:8f864b8b2edc4c9b1ca67b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const ADMIN_EMAIL = "deptc.gvatvsld@gmail.com"; // Email quản trị của anh

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            renderView(user);
        } else {
            document.getElementById('auth-section').style.display = 'block';
            document.getElementById('main-content').style.display = 'none';
        }
    });

    async function renderView(user) {
        const isAdmin = (user.email === ADMIN_EMAIL);
        const badge = document.getElementById('role-display');
        const title = document.getElementById('title-text');
        const colSender = document.getElementById('col-sender');
        const body = document.getElementById('data-body');

        badge.innerHTML = isAdmin ? '<span class="role-badge admin-mode">QUYỀN QUẢN TRỊ</span>' : '<span class="role-badge user-mode">DỮ LIỆU CÁ NHÂN</span>';
        title.innerText = isAdmin ? "Tổng hợp tất cả góp ý hệ thống" : "Lịch sử góp ý của anh/chị";
        colSender.style.display = isAdmin ? "table-cell" : "none";
        body.innerHTML = '<tr><td colspan="3">Đang truy vấn dữ liệu...</td></tr>';

        try {
            let q;
            const ref = collection(db, "feedback");
            
            if (isAdmin) {
                // Admin xem tất cả, sắp xếp mới nhất lên đầu
                q = query(ref, orderBy("time", "desc"));
            } else {
                // Nhân viên chỉ xem của mình
                q = query(ref, where("email", "==", user.email), orderBy("time", "desc"));
            }

            const snap = await getDocs(q);
            body.innerHTML = '';

            if (snap.empty) {
                body.innerHTML = '<tr><td colspan="3" style="text-align:center">Chưa có dữ liệu góp ý nào.</td></tr>';
                return;
            }

            snap.forEach(doc => {
                const d = doc.data();
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="display: ${isAdmin ? 'table-cell' : 'none'}">
                        <strong>${d.user}</strong><br><small>${d.dept}</small>
                    </td>
                    <td>
                        <div style="font-weight:600">"${d.feedback}"</div>
                        <div class="q-box"><strong>Câu hỏi:</strong> ${d.qContent || 'N/A'}</div>
                    </td>
                    <td><small>${new Date(d.time).toLocaleString('vi-VN')}</small></td>
                `;
                body.appendChild(row);
            });
        } catch (e) {
            body.innerHTML = `<tr><td colspan="3" style="color:red">Lỗi: ${e.message}. <br>Lưu ý: Anh cần tạo Index cho trường 'email' trong Firebase Indexes nếu lọc cá nhân bị lỗi.</td></tr>`;
        }
    }

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
</script>
</body>
</html>
