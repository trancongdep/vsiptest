<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đánh Giá Ngân Hàng Câu Hỏi Trắc Nghiệm An Toàn Điện</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBPNk4J9npcClKFD0daia4W8nPwwg3bX_A",
            authDomain: "vsiptest-bdbc5.firebaseapp.com",
            projectId: "vsiptest-bdbc5",
            storageBucket: "vsiptest-bdbc5.firebasestorage.app",
            messagingSenderId: "1056019256354",
            appId: "1:1056019256354:web:8f864b8b2edc4c9b1ca67b",
            measurementId: "G-42WSD293BH"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userFullName = "";
        let currentQuestionIndex = 0;
        let userResponses = {}; 

        // Dữ liệu mẫu (3 câu đầu trích từ PDF), có thể dán tiếp 62 câu còn lại vào mảng này
        const questions = [
            {
                id: 1,
                text: "Trước khi đưa hệ thống hàng rào điện (sử dụng điện làm phương tiện bảo vệ trực tiếp) vào sử dụng, chủ đầu tư bắt buộc phải hoàn thành những công việc nào dưới đây?",
                options: [
                    "A. Bố trí đủ nhân sự và ban hành quy trình quản lý vận hành, an toàn điện.",
                    "B. Bàn giao thiết bị cho chính quyền địa phương để quản lý và vận hành.",
                    "C. Xin phép Sở Công Thương để đóng điện lưới quốc gia vào hàng rào.",
                    "D. Tổ chức diễn tập phòng cháy chữa cháy quy mô lớn tại khu vực hàng rào."
                ],
                type: "single" 
            },
            {
                id: 2,
                text: "Khi thiết kế hàng rào điện bảo vệ trực tiếp bố trí độc lập, khoảng cách tối thiểu giữa hàng rào điện và hàng rào bảo vệ (phía ngoài và phía trong) được quy định là bao nhiêu?",
                options: [
                    "A. Không nhỏ hơn 1,0 m.",
                    "B. Không nhỏ hơn 1,5 m.",
                    "C. Không nhỏ hơn 2,0 m.",
                    "D. Không nhỏ hơn 2,5 m."
                ],
                type: "single"
            },
            {
                id: 3,
                text: "Quy định nào sau đây là ĐÚNG khi lắp đặt biển báo an toàn cho hệ thống hàng rào điện dùng làm phương tiện bảo vệ trực tiếp?",
                options: [
                    "A. Phải đặt biển báo 'DỪNG LẠI! CÓ ĐIỆN NGUY HIỂM CHẾT NGƯỜI' dọc theo cả 2 phía hàng rào.",
                    "B. Khoảng cách giữa 2 biển báo liên tiếp trên hàng rào không được vượt quá 20 m.",
                    "C. Biển báo phải được gắn cố định ở độ cao từ 1,7 m đến 2,0 m so với mặt đất.",
                    "D. Chỉ cần đặt biển báo ở các cửa ra vào và các góc khuất của hệ thống hàng rào."
                ],
                type: "multiple" // Sử dụng Checkbox do có nhiều đáp án đúng
            }
        ];

        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const startBtn = document.getElementById('startBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const okBtn = document.getElementById('okBtn');
        const recheckBtn = document.getElementById('recheckBtn');

        const authScreen = document.getElementById('authScreen');
        const infoScreen = document.getElementById('infoScreen');
        const quizScreen = document.getElementById('quizScreen');

        loginBtn.addEventListener('click', () => {
            const provider = new GoogleAuthProvider();
            signInWithPopup(auth, provider).catch(error => alert("Lỗi đăng nhập: " + error.message));
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                authScreen.classList.add('d-none');
                
                // Lấy lại tên nếu đã từng nhập
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists() && userDoc.data().fullName) {
                    document.getElementById('fullNameInput').value = userDoc.data().fullName;
                }
                
                infoScreen.classList.remove('d-none');
                quizScreen.classList.add('d-none');
                document.getElementById('userEmailDisplay').innerText = user.email;
            } else {
                currentUser = null;
                authScreen.classList.remove('d-none');
                infoScreen.classList.add('d-none');
                quizScreen.classList.add('d-none');
            }
        });

        startBtn.addEventListener('click', async () => {
            const nameInput = document.getElementById('fullNameInput').value.trim();
            if (!nameInput) {
                alert("Vui lòng nhập họ tên để tiếp tục!");
                return;
            }
            userFullName = nameInput;
            
            await setDoc(doc(db, "users", currentUser.uid), {
                email: currentUser.email,
                fullName: userFullName,
                lastLogin: new Date()
            }, { merge: true });

            infoScreen.classList.add('d-none');
            quizScreen.classList.remove('d-none');
            document.getElementById('quizUserInfo').innerText = `${userFullName} - ${currentUser.email}`;
            
            loadQuestion(0);
        });

        function loadQuestion(index) {
            currentQuestionIndex = index;
            const q = questions[index];
            document.getElementById('questionNumber').innerText = `Câu ${index + 1}/${questions.length}`;
            document.getElementById('questionText').innerText = q.text;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            const savedResponse = userResponses[index] || { answers: [], feedback: "" };

            q.options.forEach((opt, i) => {
                const isChecked = savedResponse.answers.includes(i.toString());
                const inputType = q.type === 'multiple' ? 'checkbox' : 'radio';
                const div = document.createElement('div');
                div.className = 'form-check mb-3';
                div.innerHTML = `
                    <input class="form-check-input option-input fs-5" type="${inputType}" name="qOption" id="opt${i}" value="${i}" ${isChecked ? 'checked' : ''}>
                    <label class="form-check-label fs-6 lh-base ms-2" for="opt${i}" style="cursor: pointer;">
                        ${opt}
                    </label>
                `;
                optionsContainer.appendChild(div);
            });

            document.getElementById('feedbackArea').classList.add('d-none');
            document.getElementById('feedbackInput').value = savedResponse.feedback || "";

            prevBtn.disabled = index === 0;
            nextBtn.disabled = index === questions.length - 1;
        }

        async function saveCurrentResponse() {
            const inputs = document.querySelectorAll('.option-input:checked');
            const selected = Array.from(inputs).map(inp => inp.value);
            const feedback = document.getElementById('feedbackInput').value.trim();

            userResponses[currentQuestionIndex] = { answers: selected, feedback: feedback };

            // Lưu dữ liệu chi tiết vào collection 'answers'
            const docId = `${currentUser.uid}_q${questions[currentQuestionIndex].id}`;
            await setDoc(doc(db, "answers", docId), {
                uid: currentUser.uid,
                email: currentUser.email,
                fullName: userFullName,
                questionId: questions[currentQuestionIndex].id,
                answers: selected,
                feedback: feedback,
                timestamp: new Date()
            });
        }

        prevBtn.addEventListener('click', async () => {
            await saveCurrentResponse();
            if (currentQuestionIndex > 0) loadQuestion(currentQuestionIndex - 1);
        });

        nextBtn.addEventListener('click', async () => {
            await saveCurrentResponse();
            if (currentQuestionIndex < questions.length - 1) loadQuestion(currentQuestionIndex + 1);
        });

        okBtn.addEventListener('click', async () => {
            okBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Đang lưu...';
            okBtn.disabled = true;
            await saveCurrentResponse();
            
            // Đổi màu nút tạm thời để báo thành công
            okBtn.classList.replace('btn-success', 'btn-primary');
            okBtn.innerHTML = 'Đã Lưu!';
            
            setTimeout(() => {
                okBtn.classList.replace('btn-primary', 'btn-success');
                okBtn.innerHTML = 'OK';
                okBtn.disabled = false;
            }, 1000);
        });

        recheckBtn.addEventListener('click', () => {
            const feedbackArea = document.getElementById('feedbackArea');
            feedbackArea.classList.toggle('d-none');
            if (!feedbackArea.classList.contains('d-none')) {
                document.getElementById('feedbackInput').focus();
            }
        });

    </script>
</head>
<body class="bg-light">
    <div class="container mt-2">
        <div class="row">
            <div class="col text-end">
                <span class="badge bg-secondary">v1.0</span>
            </div>
        </div>
    </div>

    <div class="container mt-3 mb-5" style="max-width: 900px;">
        <h2 class="text-center text-primary mb-4 fw-bold">Rà Soát Ngân Hàng Câu Hỏi - VSIP</h2>

        <div id="authScreen" class="card shadow border-0 text-center p-5">
            <h4 class="mb-4 text-muted">Vui lòng đăng nhập để bắt đầu phiên đánh giá</h4>
            <button id="loginBtn" class="btn btn-outline-danger btn-lg mx-auto d-flex align-items-center justify-content-center gap-2" style="width: 280px;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-google" viewBox="0 0 16 16">
                    <path d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z"/>
                </svg>
                Đăng nhập bằng Google
            </button>
        </div>

        <div id="infoScreen" class="card shadow border-0 p-4 d-none">
            <div class="text-end mb-4">
                <span id="userEmailDisplay" class="text-muted me-3 fw-medium"></span>
                <button id="logoutBtn" class="btn btn-sm btn-outline-secondary">Đăng xuất</button>
            </div>
            <h4 class="mb-4 text-center text-dark">Thông tin người tham gia đánh giá</h4>
            <div class="mb-4">
                <label for="fullNameInput" class="form-label fw-bold">Họ và Tên (Hiển thị trên báo cáo):</label>
                <input type="text" class="form-control form-control-lg bg-light" id="fullNameInput" placeholder="Ví dụ: Trần Công Đẹp">
            </div>
            <button id="startBtn" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">Bắt Đầu Đánh Giá Kỹ Thuật</button>
        </div>

        <div id="quizScreen" class="card shadow border-0 p-4 d-none">
            <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                <span class="fw-bold text-success" id="quizUserInfo"></span>
                <span class="badge bg-dark px-3 py-2 fs-6 shadow-sm" id="questionNumber">Câu 1/65</span>
            </div>
            
            <div class="mb-4 bg-light p-3 rounded border-start border-4 border-primary">
                <h5 id="questionText" class="lh-base mb-0 text-dark" style="font-weight: 600;">Nội dung câu hỏi...</h5>
            </div>
            
            <div id="optionsContainer" class="mb-4 px-3 py-3 bg-white rounded border">
                </div>

            <div id="feedbackArea" class="mb-4 d-none">
                <label for="feedbackInput" class="form-label fw-bold text-danger d-flex align-items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-exclamation-triangle-fill" viewBox="0 0 16 16">
                        <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
                    </svg>
                    Góp ý / Đề xuất sửa đổi câu hỏi này:
                </label>
                <textarea class="form-control border-warning shadow-sm" id="feedbackInput" rows="3" placeholder="Ghi chú các lỗi kỹ thuật, lỗi chính tả, hoặc ý kiến thay đổi câu hỏi/đáp án..."></textarea>
            </div>

            <div class="d-flex justify-content-between flex-wrap gap-2 mt-4 pt-4 border-top">
                <button id="prevBtn" class="btn btn-outline-secondary px-4 fw-bold shadow-sm">◄ Câu trước</button>
                <div class="d-flex gap-2">
                    <button id="recheckBtn" class="btn btn-warning px-4 fw-bold shadow-sm">Recheck ✎</button>
                    <button id="okBtn" class="btn btn-success px-4 fw-bold shadow-sm">OK (Lưu) ✔</button>
                </div>
                <button id="nextBtn" class="btn btn-primary px-4 fw-bold shadow-sm">Câu tiếp ►</button>
            </div>
        </div>
    </div>
</body>
</html>
