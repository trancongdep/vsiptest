<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sát hạch VSIP 2026</title>
    <style>
        :root { --primary: #004a99; --accent: #f37021; --success: #28a745; --danger: #dc3545; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .container { flex: 1; max-width: 900px; margin: 20px auto; padding: 0 15px; width: 100%; box-sizing: border-box; }
        .quiz-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        .badge { background: #eef2f6; padding: 6px 12px; border-radius: 20px; font-size: 13px; color: var(--primary); border: 1px solid #d1d9e6; margin-right: 5px; }
        .question-text { font-size: 1.3rem; font-weight: 700; margin: 20px 0; line-height: 1.5; }
        .opt { padding: 15px; border: 2px solid #e0e6ed; border-radius: 10px; cursor: pointer; margin-bottom: 10px; }
        .opt.selected { background: #e7f1ff; border-color: var(--primary); }
        .opt.correct { background: #e6ffed !important; border-color: var(--success) !important; color: #155724; }
        .opt.wrong { background: #fff5f5 !important; border-color: var(--danger) !important; color: #721c24; }
        .controls { display: flex; justify-content: space-between; margin-top: 25px; gap: 10px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-gray { background: #6c757d; color: white; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-orange { background: var(--accent); color: white; }
        .support-panel { margin-top: 20px; background: #fff9f1; border-left: 6px solid var(--accent); padding: 20px; display: none; }
        footer { background: #eef2f6; color: #444; padding: 20px 15px; text-align: center; font-size: 0.9rem; border-top: 3px solid var(--primary); }
    </style>
</head>
<body>

<header><h1>BỘ ĐỀ TRẮC NGHIỆM AN TOÀN ĐIỆN VSIP 2026</h1></header>

<div class="container">
    <div id="loading" style="text-align:center; padding:50px">Đang tải câu hỏi...</div>
    <div id="quiz-area" style="display:none">
        <div class="quiz-card">
            <div style="margin-bottom:15px">
                <span id="u-info" class="badge"></span>
                <span id="lvl-info" class="badge"></span>
                <span id="tp-info" class="badge"></span>
                <span id="q-count" class="badge" style="background:var(--primary); color:white; float:right"></span>
            </div>
            <div id="q-text" class="question-text"></div>
            <div id="options"></div>
            <div class="controls">
                <button class="btn-gray" onclick="window.location.href='index.html'">« Thay đổi đề</button>
                <div style="display:flex; gap:8px">
                    <button class="btn-gray" onclick="move(-1)">Trước</button>
                    <button class="btn-blue" onclick="check()">Kiểm tra</button>
                    <button class="btn-orange" onclick="toggle()">Hỗ trợ</button>
                    <button class="btn-gray" onclick="move(1)">Tiếp »</button>
                </div>
            </div>
            <div id="support" class="support-panel">
                <p><strong>Đáp án đúng:</strong> <span id="ans" style="color:var(--success); font-weight:bold"></span></p>
                <p><strong>Căn cứ:</strong> <span id="basis"></span></p>
                <div style="background:white; padding:10px; border:1px solid #ffe0b2; font-style:italic" id="quote"></div>
            </div>
        </div>
    </div>
</div>

<footer>
    <div>Nhóm biên soạn bộ đề trắc nghiệm An toàn điện VDC @2026</div>
    <div style="font-weight:600; color:var(--primary)">Liên hệ: Trần Công Đẹp - Phone: 0963.292.882 - email: deptc.gvatvsld@gmail.com</div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBPNk4J9npcClKFD0daia4W8nPwwg3bX_A",
        authDomain: "vsiptest-bdbc5.firebaseapp.com",
        projectId: "vsiptest-bdbc5",
        storageBucket: "vsiptest-bdbc5.firebasestorage.app",
        messagingSenderId: "1056019256354",
        appId: "1:1056019256354:web:8f864b8b2edc4c9b1ca67b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const params = new URLSearchParams(window.location.search);
    const level = params.get('level'), topic = params.get('topic'), name = params.get('name'), dept = params.get('dept');

    let questions = [], cur = 0, picked = null;

    async function load() {
        const snap = await getDocs(query(collection(db, "questions"), where("level", "==", level)));
        let pool = []; snap.forEach(d => pool.push(d.data()));
        questions = (topic && topic !== "0") ? pool.filter(q => q.category === "Chuyên đề " + topic) : pool;
        if (questions.length === 0) return document.getElementById('loading').innerText = "Không tìm thấy câu hỏi!";
        questions.sort(() => Math.random() - 0.5);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('u-info').innerText = `${name} - ${dept}`;
        document.getElementById('lvl-info').innerText = "Bậc: " + level;
        render();
    }

    function render() {
        const q = questions[cur]; picked = null;
        document.getElementById('support').style.display = 'none';
        document.getElementById('q-count').innerText = `Câu ${cur+1}/${questions.length}`;
        document.getElementById('q-text').innerText = q.content;
        document.getElementById('options').innerHTML = ['A','B','C','D'].map(v => `<div class="opt" onclick="sel(this, '${v}')">${v}. ${q['option'+v]}</div>`).join('');
        document.getElementById('ans').innerText = q.correctAnswer;
        document.getElementById('basis').innerText = q.newBasis;
        document.getElementById('quote').innerText = q.quote;
    }

    window.sel = (el, v) => { document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected','correct','wrong')); el.classList.add('selected'); picked = v; };
    window.check = () => { if(!picked) return; const q = questions[cur]; document.querySelectorAll('.opt').forEach(o => { if(o.innerText.startsWith(q.correctAnswer+".")) o.classList.add('correct'); if(o.classList.contains('selected') && !o.innerText.startsWith(q.correctAnswer+".")) o.classList.add('wrong'); }); };
    window.move = (d) => { if(cur+d >= 0 && cur+d < questions.length) { cur += d; render(); } };
    window.toggle = () => { const s = document.getElementById('support'); s.style.display = s.style.display === 'block' ? 'none' : 'block'; };

    load();
</script>
</body>
</html>
