<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Sát hạch An toàn điện - v1.3</title>
    <style>
        :root {
            --primary: #004a99;
            --secondary: #f37021;
            --success: #28a745;
            --danger: #dc3545;
            --light: #f8f9fa;
            --dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
            color: var(--dark);
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .badge {
            font-size: 13px;
            background: #eef2f7;
            padding: 6px 12px;
            border-radius: 20px;
            color: var(--primary);
            font-weight: 600;
            margin-right: 5px;
            border: 1px solid #d1d9e6;
        }

        .question-area {
            min-height: 250px;
        }

        .question-text {
            font-size: 1.25rem;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
            color: #1a1a1a;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
            display: flex;
            align-items: flex-start;
        }

        .option:hover {
            border-color: var(--primary);
            background-color: #f8fbff;
        }

        .option.selected {
            border-color: var(--primary);
            background-color: #eef6ff;
            font-weight: 500;
        }

        .option.correct {
            background-color: #e6ffed !important;
            border-color: var(--success) !important;
            color: #155724;
        }

        .option.wrong {
            background-color: #fff5f5 !important;
            border-color: var(--danger) !important;
            color: #721c24;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: 0.2s;
        }

        .btn-gray { background: #6c757d; color: white; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-orange { background: var(--secondary); color: white; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Panel Hỗ trợ */
        .support-box {
            margin-top: 20px;
            padding: 20px;
            background: #fff9f1;
            border-left: 5px solid var(--secondary);
            border-radius: 4px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .support-box h4 { margin-top: 0; color: #af4c00; text-transform: uppercase; font-size: 0.9rem; }
        .quote { background: white; padding: 12px; border-radius: 6px; border: 1px solid #ffe0b2; font-style: italic; margin: 10px 0; font-size: 0.95rem; line-height: 1.4; }

        .feedback-area { margin-top: 15px; }
        textarea { width: 100%; height: 70px; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        
        #loader { text-align: center; padding: 60px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="loader">
        <div class="spinner"></div>
        <p>Đang đồng bộ dữ liệu với Firebase...</p>
    </div>

    <div id="main-content" style="display:none;">
        <div class="header">
            <div>
                <span id="levelTag" class="badge">Bậc: --</span>
                <span id="topicTag" class="badge">Chuyên đề: --</span>
            </div>
            <div id="counter" style="font-weight:700; color: var(--primary);">Câu 1/--</div>
        </div>

        <div class="question-area">
            <div id="qText" class="question-text"></div>
            <div id="options" class="options-list"></div>
        </div>

        <div class="controls">
            <button class="btn-gray" onclick="changeQ(-1)" id="prevBtn">« Câu Trước</button>
            <div style="display:flex; gap:8px;">
                <button class="btn-blue" onclick="checkAnswer()">Kiểm tra</button>
                <button class="btn-orange" onclick="toggleSupport()">Hỗ trợ</button>
            </div>
            <button class="btn-gray" onclick="changeQ(1)" id="nextBtn">Câu Tiếp »</button>
        </div>

        <div id="supportPanel" class="support-box">
            <h4>Thông tin giải thích & Căn cứ</h4>
            <p><strong>Đáp án đúng:</strong> <span id="correctAns" style="color: var(--success); font-weight:700"></span></p>
            <p><strong>Căn cứ pháp lý:</strong> <span id="basisTxt"></span></p>
            <div class="quote">
                <strong>Trích dẫn:</strong> <br>
                <span id="quoteTxt"></span>
            </div>
            
            <div class="feedback-area">
                <p style="margin-bottom:8px; font-weight:600; font-size:0.9rem;">Góp ý cải tiến câu hỏi:</p>
                <textarea id="feedbackInp" placeholder="Ví dụ: Câu hỏi sai kiến thức, lỗi chính tả, căn cứ chưa cập nhật..."></textarea>
                <button class="btn-blue" style="margin-top:8px; font-size:12px; padding: 8px 16px;" onclick="submitFeedback()">Gửi ý kiến</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo",
        authDomain: "tavietnam-78ae8.firebaseapp.com",
        projectId: "tavietnam-78ae8",
        storageBucket: "tavietnam-78ae8.firebasestorage.app",
        messagingSenderId: "670121705534",
        appId: "1:670121705534:web:1027ad98550573ad37116f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const selLevel = params.get('level') || "";
    const selTopicIdx = params.get('topic') || "0";

    let allQuestions = [];
    let currentIdx = 0;
    let userPicked = null;

    async function init() {
        console.log("Loading for Level:", selLevel, "Topic Index:", selTopicIdx);
        
        try {
            // Bước 1: Lấy tất cả câu hỏi của Bậc này (Tối ưu hóa Index)
            const qRef = collection(db, "questions");
            const q = query(qRef, where("level", "==", selLevel.trim()));
            
            const snap = await getDocs(q);
            let rawData = [];
            snap.forEach(doc => rawData.push({ dbId: doc.id, ...doc.data() }));

            console.log("Tổng số câu bậc", selLevel, "tải được:", rawData.length);

            // Bước 2: Lọc Chuyên đề tại máy khách (Client-side filtering)
            if (selTopicIdx === "0") {
                allQuestions = rawData; // Lấy tất cả (bao gồm Kiến thức chung + các chuyên đề)
                document.getElementById('topicTag').innerText = "Tất cả chuyên đề";
            } else {
                const topicName = "Chuyên đề " + selTopicIdx;
                allQuestions = rawData.filter(item => 
                    item.category && item.category.trim() === topicName
                );
                document.getElementById('topicTag').innerText = topicName;
            }

            if (allQuestions.length === 0) {
                // Trường hợp đặc biệt: Nếu không tìm thấy theo "Chuyên đề X", thử tìm theo "Kiến thức chung"
                allQuestions = rawData.filter(item => item.category === "Kiến thức chung");
                document.getElementById('topicTag').innerText = "Kiến thức chung (Mặc định)";
            }

            if (allQuestions.length === 0) {
                document.getElementById('loader').innerHTML = `
                    <p style="color:red; font-weight:bold">KHÔNG TÌM THẤY CÂU HỎI!</p>
                    <p style="font-size:13px">Dữ liệu Bậc <b>${selLevel}</b> có thể chưa được upload hoặc sai tên trường.</p>
                    <button class="btn-blue" onclick="location.href='index.html'">Quay lại</button>
                `;
                return;
            }

            // Trộn ngẫu nhiên
            allQuestions.sort(() => Math.random() - 0.5);
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('levelTag').innerText = "Bậc: " + selLevel;
            
            renderQuestion();

        } catch (err) {
            console.error(err);
            document.getElementById('loader').innerText = "Lỗi kết nối: " + err.message;
        }
    }

    function renderQuestion() {
        const q = allQuestions[currentIdx];
        userPicked = null;
        
        // Reset UI
        document.getElementById('supportPanel').style.display = 'none';
        document.getElementById('feedbackInp').value = "";
        document.getElementById('counter').innerText = `Câu ${currentIdx + 1}/${allQuestions.length}`;
        document.getElementById('qText').innerText = q.content;
        
        const html = `
            <div class="option" onclick="pick(this, 'A')">A. ${q.optionA}</div>
            <div class="option" onclick="pick(this, 'B')">B. ${q.optionB}</div>
            <div class="option" onclick="pick(this, 'C')">C. ${q.optionC}</div>
            <div class="option" onclick="pick(this, 'D')">D. ${q.optionD}</div>
        `;
        document.getElementById('options').innerHTML = html;

        // Cập nhật thông tin hỗ trợ ẩn
        document.getElementById('correctAns').innerText = q.correctAnswer;
        document.getElementById('basisTxt').innerText = q.newBasis || "Theo quy chuẩn an toàn điện hiện hành.";
        document.getElementById('quoteTxt').innerText = q.quote || "Nội dung trích dẫn đang được cập nhật.";
        
        // Disable/Enable nút
        document.getElementById('prevBtn').disabled = (currentIdx === 0);
        document.getElementById('nextBtn').disabled = (currentIdx === allQuestions.length - 1);
    }

    window.pick = (el, val) => {
        document.querySelectorAll('.option').forEach(o => o.classList.remove('selected', 'correct', 'wrong'));
        el.classList.add('selected');
        userPicked = val;
    };

    window.checkAnswer = () => {
        if (!userPicked) return alert("Vui lòng chọn 1 đáp án!");
        const q = allQuestions[currentIdx];
        const opts = document.querySelectorAll('.option');
        
        opts.forEach(opt => {
            const txt = opt.innerText.trim();
            // So khớp đáp án (ví dụ "A.")
            if (txt.startsWith(q.correctAnswer.trim() + ".")) {
                opt.classList.add('correct');
            }
            if (opt.classList.contains('selected') && !txt.startsWith(q.correctAnswer.trim() + ".")) {
                opt.classList.add('wrong');
            }
        });
    };

    window.toggleSupport = () => {
        const panel = document.getElementById('supportPanel');
        panel.style.display = (panel.style.display === 'block' ? 'none' : 'block');
    };

    window.changeQ = (step) => {
        currentIdx += step;
        renderQuestion();
    };

    window.submitFeedback = async () => {
        const text = document.getElementById('feedbackInp').value;
        if (!text.trim()) return alert("Vui lòng nhập nội dung góp ý!");
        
        try {
            await addDoc(collection(db, "feedback"), {
                questionId: allQuestions[currentIdx].id || "N/A",
                questionContent: allQuestions[currentIdx].content,
                feedback: text,
                userLevel: selLevel,
                timestamp: new Date().toISOString()
            });
            alert("Cảm ơn bạn! Góp ý đã được gửi đến ban quản trị.");
            document.getElementById('feedbackInp').value = "";
        } catch (e) {
            alert("Lỗi khi gửi phản hồi.");
        }
    };

    init();
</script>

</body>
</html>
