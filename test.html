<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Làm bài Sát hạch - VSIP 2026</title>
    <style>
        :root { --primary-blue: #004a99; --accent: #f37021; --success: #28a745; --danger: #dc3545; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        
        header { background: var(--primary-blue); color: white; padding: 20px 10px; text-align: center; }
        header h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; font-weight: 700; }

        .container { flex: 1; max-width: 900px; margin: 30px auto; padding: 0 15px; width: 100%; box-sizing: border-box; }
        .quiz-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        
        .meta { display: flex; gap: 10px; margin-bottom: 20px; }
        .badge { background: #eef2f6; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--primary-blue); border: 1px solid #d1d9e6; }

        .question-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 25px; line-height: 1.5; color: #1a1a1a; }
        
        .options-grid { display: flex; flex-direction: column; gap: 12px; }
        .opt { padding: 18px; border: 2px solid #e0e6ed; border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 1.05rem; }
        .opt:hover { background: #f0f7ff; border-color: var(--primary-blue); }
        .opt.selected { background: #e7f1ff; border-color: var(--primary-blue); font-weight: 600; }
        .opt.correct { background: #e6ffed !important; border-color: var(--success) !important; color: #155724; font-weight: 700; }
        .opt.wrong { background: #fff5f5 !important; border-color: var(--danger) !important; color: #721c24; }

        .nav-btns { display: flex; justify-content: space-between; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        button { padding: 12px 25px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .btn-gray { background: #6c757d; color: white; }
        .btn-blue { background: var(--primary-blue); color: white; }
        .btn-orange { background: var(--accent); color: white; }

        /* Support Panel */
        .support-panel { margin-top: 20px; background: #fff9f1; border-left: 6px solid var(--accent); padding: 20px; border-radius: 4px; display: none; animation: fadeIn 0.3s; }
        .quote-text { background: white; padding: 12px; border-radius: 6px; border: 1px solid #ffe0b2; font-style: italic; margin-top: 10px; color: #5d4037; }
        textarea { width: 100%; height: 80px; margin-top: 15px; border-radius: 6px; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; font-family: inherit; }

        footer { background: #eef2f6; color: #444; padding: 20px 15px; text-align: center; font-size: 0.95rem; border-top: 3px solid var(--primary-blue); line-height: 1.6; }
        .footer-line-2 { font-weight: 600; color: var(--primary-blue); margin-top: 5px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #loading { text-align: center; padding: 50px; font-weight: bold; color: var(--primary-blue); }
    </style>
</head>
<body>

<header>
    <h1>BỘ ĐỀ TRẮC NGHIỆM AN TOÀN ĐIỆN VSIP 2026</h1>
</header>

<div class="container">
    <div id="loading">Đang tải câu hỏi từ hệ thống...</div>
    
    <div id="quiz-area" style="display:none;">
        <div class="quiz-card">
            <div class="meta">
                <span id="badge-lvl" class="badge"></span>
                <span id="badge-topic" class="badge"></span>
                <span id="q-count" class="badge" style="margin-left: auto; background: var(--primary-blue); color:white;"></span>
            </div>

            <div id="q-text" class="question-text"></div>
            <div id="options" class="options-grid"></div>

            <div class="nav-btns">
                <button class="btn-gray" onclick="move(-1)">« Câu Trước</button>
                <div style="display:flex; gap:10px;">
                    <button class="btn-blue" onclick="check()">Kiểm tra</button>
                    <button class="btn-orange" onclick="toggleSupport()">Hỗ trợ</button>
                </div>
                <button class="btn-gray" onclick="move(1)">Câu Tiếp »</button>
            </div>

            <div id="support-panel" class="support-panel">
                <p><strong>Đáp án đúng:</strong> <span id="ans-label" style="color: var(--success); font-weight: 700;"></span></p>
                <p><strong>Căn cứ pháp lý:</strong> <span id="basis-label"></span></p>
                <div class="quote-text">
                    <strong>Trích dẫn:</strong> <br>
                    <span id="quote-label"></span>
                </div>
                <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ffd180;">
                <p style="font-weight: 600; font-size: 0.9rem;">Ý kiến phản hồi cải tiến câu hỏi:</p>
                <textarea id="feedback" placeholder="Nhập nhận xét của bạn về câu hỏi này..."></textarea>
                <button class="btn-blue" style="margin-top:10px; font-size: 13px;" onclick="sendFeedback()">Gửi phản hồi</button>
            </div>
        </div>
    </div>
</div>

<footer>
    <div>Nhóm biên soạn bộ đề trắc nghiệm An toàn điện VDC @2026</div>
    <div class="footer-line-2">Liên hệ: Trần Công Đẹp - Phone: 0963.292.882 - email: deptc.gvatvsld@gmail.com</div>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo",
        authDomain: "tavietnam-78ae8.firebaseapp.com",
        projectId: "tavietnam-78ae8",
        storageBucket: "tavietnam-78ae8.firebasestorage.app",
        messagingSenderId: "670121705534",
        appId: "1:670121705534:web:1027ad98550573ad37116f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const level = params.get('level');
    const topicIdx = params.get('topic');

    let questions = [];
    let curIdx = 0;
    let picked = null;

    async function load() {
        try {
            const q = query(collection(db, "questions"), where("level", "==", level));
            const snap = await getDocs(q);
            let pool = [];
            snap.forEach(d => pool.push({id: d.id, ...d.data()}));

            if (topicIdx && topicIdx !== "0") {
                const topicName = "Chuyên đề " + topicIdx;
                questions = pool.filter(q => q.category === topicName);
                document.getElementById('badge-topic').innerText = topicName;
            } else {
                questions = pool;
                document.getElementById('badge-topic').innerText = "Kiến thức chung";
            }

            if (questions.length === 0) {
                document.getElementById('loading').innerHTML = "Rất tiếc, không tìm thấy câu hỏi phù hợp.<br><br><button onclick='history.back()' class='btn-blue'>Quay lại</button>";
                return;
            }

            questions.sort(() => Math.random() - 0.5);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('quiz-area').style.display = 'block';
            document.getElementById('badge-lvl').innerText = "Bậc: " + level;
            render();
        } catch (e) {
            document.getElementById('loading').innerText = "Lỗi kết nối Firebase.";
        }
    }

    function render() {
        const q = questions[curIdx];
        picked = null;
        document.getElementById('support-panel').style.display = 'none';
        document.getElementById('feedback').value = "";
        document.getElementById('q-count').innerText = `Câu ${curIdx + 1}/${questions.length}`;
        document.getElementById('q-text').innerText = q.content;
        
        const html = `
            <div class="opt" onclick="sel(this, 'A')">A. ${q.optionA}</div>
            <div class="opt" onclick="sel(this, 'B')">B. ${q.optionB}</div>
            <div class="opt" onclick="sel(this, 'C')">C. ${q.optionC}</div>
            <div class="opt" onclick="sel(this, 'D')">D. ${q.optionD}</div>
        `;
        document.getElementById('options').innerHTML = html;
        document.getElementById('ans-label').innerText = q.correctAnswer;
        document.getElementById('basis-label').innerText = q.newBasis || "Theo quy định hiện hành.";
        document.getElementById('quote-label').innerText = q.quote || "Đang cập nhật...";
    }

    window.sel = (el, val) => {
        document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected', 'correct', 'wrong'));
        el.classList.add('selected');
        picked = val;
    }

    window.check = () => {
        if (!picked) return alert("Vui lòng chọn đáp án!");
        const q = questions[curIdx];
        document.querySelectorAll('.opt').forEach(o => {
            const txt = o.innerText.trim();
            if (txt.startsWith(q.correctAnswer.trim() + ".")) o.classList.add('correct');
            if (o.classList.contains('selected') && !txt.startsWith(q.correctAnswer.trim() + ".")) o.classList.add('wrong');
        });
    }

    window.move = (dir) => {
        if (curIdx + dir >= 0 && curIdx + dir < questions.length) {
            curIdx += dir;
            render();
        }
    }

    window.toggleSupport = () => {
        const p = document.getElementById('support-panel');
        p.style.display = (p.style.display === 'block' ? 'none' : 'block');
    }

    window.sendFeedback = async () => {
        const msg = document.getElementById('feedback').value;
        if (!msg.trim()) return alert("Vui lòng nhập nội dung!");
        await addDoc(collection(db, "feedback"), {
            qId: questions[curIdx].id,
            qContent: questions[curIdx].content,
            feedback: msg,
            time: new Date().toISOString()
        });
        alert("Góp ý của bạn đã được ghi nhận. Trân trọng cảm ơn!");
        document.getElementById('feedback').value = "";
    }

    load();
</script>
</body>
</html>
