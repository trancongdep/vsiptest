<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sát hạch An toàn điện VSIP 2026 - v6.2</title>
    <style>
        /* [Giữ nguyên CSS cũ của anh] */
        :root { --primary-blue: #004a99; --accent: #f37021; --success: #28a745; --danger: #dc3545; --bg-color: #f4f7f9; --text-main: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; flex-direction: column; min-height: 100vh; color: var(--text-main); }
        header { background: var(--primary-blue); color: white; padding: 25px 15px; text-align: center; position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        header h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; flex: 1; }
        .btn-home-nav { position: absolute; left: 15px; background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 6px; font-size: 0.9rem; text-decoration: none; font-weight: 600; }
        .container { flex: 1; max-width: 1200px; margin: 20px auto; padding: 0 15px; width: 100%; box-sizing: border-box; }
        .layout-wrapper { display: flex; flex-direction: column; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .badge { background: #eef2f6; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--primary-blue); border: 1px solid #d1d9e6; width: 100%; box-sizing: border-box; margin-bottom: 8px; text-align: center; }
        .question-text { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; line-height: 1.5; }
        .opt { padding: 16px; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; margin-bottom: 12px; font-size: 1.05rem; background: #fff; }
        .opt.selected { background: #e7f1ff; border-color: var(--primary-blue); font-weight: 600; }
        .opt.correct { background: #e6ffed !important; border-color: var(--success) !important; color: #155724; font-weight: 700; }
        .opt.wrong { background: #fff5f5 !important; border-color: var(--danger) !important; color: #721c24; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: var(--primary-blue); color: white; }
        .btn-gray { background: #6c757d; color: white; }
        .support-panel { background: #fff9f1; border-left: 6px solid var(--accent); padding: 20px; border-radius: 8px; margin-top: 15px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary-blue); border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (min-width: 992px) { .layout-wrapper { flex-direction: row; } .quiz-main { flex: 2; } .quiz-sidebar { flex: 1; } }
    </style>
</head>
<body>
<header><a href="index.html" class="btn-home-nav">« Trang chủ</a><h1>BỘ ĐỀ AN TOÀN ĐIỆN - v6.2</h1></header>
<div class="container">
    <div id="loading" style="text-align:center; padding:100px 20px;"><div class="spinner"></div><p id="loading-msg">Đang nạp câu hỏi...</p></div>
    <div id="quiz-area" style="display:none;">
        <div class="layout-wrapper">
            <div class="quiz-main">
                <div class="card">
                    <div id="q-instruction" style="font-size:12px; font-weight:800; color:var(--accent); margin-bottom:10px;">...</div>
                    <div id="q-text" class="question-text"></div>
                    <div id="options"></div>
                    <div class="controls"><button class="btn-gray" onclick="move(-1)">Trước</button><button class="btn-blue" onclick="checkAnswer()">Kiểm tra</button><button class="btn-gray" onclick="move(1)">Tiếp »</button></div>
                </div>
            </div>
            <div class="quiz-sidebar">
                <div class="card">
                    <div id="q-count" class="badge">Câu --/--</div>
                    <div class="badge">Học viên: <span id="badge-name" style="color:var(--accent)">...</span></div>
                    <div id="badge-lvl" class="badge">Bậc thi: --</div>
                    <div id="support-panel" class="support-panel">
                        <p><strong>Đáp án đúng:</strong> <span id="ans-label" style="color:var(--success)"></span></p>
                        <p><strong>Căn cứ:</strong> <span id="basis-label"></span></p>
                        <div id="quote-label" style="font-style:italic; font-size:0.9rem; color:#555; background:white; padding:10px; border-radius:5px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo", 
        authDomain: "tavietnam-78ae8.firebaseapp.com", 
        projectId: "tavietnam-78ae8", 
        storageBucket: "tavietnam-78ae8.firebasestorage.app", 
        messagingSenderId: "670121705534", 
        appId: "1:670121705534:web:1027ad98550573ad37116f" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const params = new URLSearchParams(window.location.search);
    const levelParam = params.get('level');
    const topicIdx = params.get('topic') || "0";
    const userName = decodeURIComponent(params.get('name') || "Học viên");

    let questions = []; let curIdx = 0;

    onAuthStateChanged(auth, (user) => { if (user) load(); else window.location.href = 'index.html'; });

    async function load() {
        try {
            const levelStr = String(levelParam);
            const qRef = collection(db, "questions");
            // Lọc linh hoạt cho cả "3" và "3/5"
            const q = query(qRef, where("level", "in", [levelStr, levelStr + "/5", "Bậc " + levelStr]));
            const snap = await getDocs(q);
            let pool = []; snap.forEach(d => pool.push(d.data()));

            if (topicIdx !== "0") {
                const s = "Chuyên đề " + topicIdx;
                questions = pool.filter(i => (i.category||"").includes(s) || (i.category||"").includes("Kiến thức chung"));
            } else questions = pool;

            questions.sort((a,b) => parseInt(a.questionId) - parseInt(b.questionId));
            
            if(questions.length > 0) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('quiz-area').style.display = 'block';
                document.getElementById('badge-name').innerText = userName;
                document.getElementById('badge-lvl').innerText = "Bậc " + levelStr;
                render();
            } else {
                document.getElementById('loading-msg').innerText = "Không tìm thấy câu hỏi!";
            }
        } catch (e) { document.getElementById('loading-msg').innerText = "Lỗi nạp dữ liệu."; }
    }

    function render() {
        const q = questions[curIdx];
        const isMulti = (q.correctAnswer || "").replace(/[\s,]/g, "").length > 1;
        document.getElementById('q-instruction').innerText = isMulti ? "CHỌN NHIỀU ĐÁP ÁN ĐÚNG" : "CHỌN MỘT ĐÁP ÁN ĐÚNG";
        document.getElementById('q-count').innerText = `Câu ${curIdx + 1}/${questions.length}`;
        document.getElementById('q-text').innerHTML = `<span style="color:var(--accent)">(Câu ${q.questionId})</span> ${q.content}`;
        document.getElementById('options').innerHTML = `
            <div class="opt" data-val="A" onclick="sel(this)">A. ${q.optionA}</div>
            <div class="opt" data-val="B" onclick="sel(this)">B. ${q.optionB}</div>
            <div class="opt" data-val="C" onclick="sel(this)">C. ${q.optionC}</div>
            <div class="opt" data-val="D" onclick="sel(this)">D. ${q.optionD}</div>
        `;
        document.getElementById('ans-label').innerText = q.correctAnswer;
        document.getElementById('basis-label').innerText = q.newBasis || "---";
        document.getElementById('quote-label').innerText = q.quote || "---";
    }

    window.sel = (el) => {
        const isMulti = document.getElementById('q-instruction').innerText.includes("NHIỀU");
        if (!isMulti) document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected', 'correct', 'wrong'));
        el.classList.toggle('selected');
    }

    window.checkAnswer = () => {
        const correct = (questions[curIdx].correctAnswer || "").toUpperCase();
        document.querySelectorAll('.opt').forEach(opt => {
            const val = opt.getAttribute('data-val');
            if (correct.includes(val)) opt.classList.add('correct');
            else if (opt.classList.contains('selected')) opt.classList.add('wrong');
        });
    }

    window.move = (d) => { if (curIdx+d >= 0 && curIdx+d < questions.length) { curIdx+=d; render(); } }
</script>
</body>
</html>
