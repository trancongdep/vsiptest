<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Questions - VSIP 2026 - v4.1</title>
    <style>
        :root { --primary: #004a99; --accent: #f37021; --success: #28a745; --danger: #dc3545; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; position: sticky; top: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        header h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; flex: 1; }
        .btn-nav { position: absolute; left: 15px; background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; text-decoration: none; font-weight: 600; }
        .container { flex: 1; max-width: 1200px; margin: 20px auto; padding: 0 15px; width: 100%; box-sizing: border-box; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .filter-bar input, .filter-bar select { padding: 12px; border: 2px solid #ddd; border-radius: 8px; flex: 1; min-width: 200px; }
        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8f9fa; color: var(--primary); padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; vertical-align: top; }
        .btn-edit-small { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-del-small { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-left: 5px; }
        #edit-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 800px; border-radius: 12px; padding: 30px; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; } .form-group label { display: block; font-weight: 700; margin-bottom: 5px; color: var(--primary); }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; }
        footer { background: #eef2f6; padding: 20px; text-align: center; border-top: 3px solid var(--primary); margin-top: auto; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<header><a href="index.html" class="btn-nav">« Quản trị</a><h1>HIỆU CHỈNH BỘ ĐỀ - v4.1</h1></header>
<div class="container">
    <div id="main-content" class="card">
        <div class="filter-bar">
            <select id="level-filter" onchange="loadQuestions()">
                <option value="1/5">Bậc 1/5</option>
                <option value="2/5">Bậc 2/5</option>
                <option value="3/5" selected>Bậc 3/5</option>
                <option value="4/5">Bậc 4/5</option>
                <option value="5/5">Bậc 5/5</option>
            </select>
            <input type="text" id="search-input" placeholder="Tìm số câu hỏi hoặc nội dung..." oninput="filterQuestions()">
            <button onclick="loadQuestions()" style="background:var(--primary); color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight: bold;">LÀM MỚI</button>
        </div>
        <div id="loading-table" style="display:none"><div class="spinner"></div><p style="text-align:center">Đang tải câu hỏi...</p></div>
        <div class="table-wrapper">
            <table>
                <thead><tr><th>ID</th><th>Bậc</th><th>Nội dung</th><th>Đ/A</th><th>Thao tác</th></tr></thead>
                <tbody id="question-list"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="edit-modal">
    <div class="modal-content">
        <h2 style="color:var(--primary); margin-top:0">Sửa Câu hỏi ID: <span id="m-id"></span></h2>
        <div class="form-group"><label>Câu hỏi:</label><textarea id="m-content" rows="3"></textarea></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
            <div class="form-group"><label>Đáp án A:</label><input type="text" id="m-optA"></div>
            <div class="form-group"><label>Đáp án B:</label><input type="text" id="m-optB"></div>
            <div class="form-group"><label>Đáp án C:</label><input type="text" id="m-optC"></div>
            <div class="form-group"><label>Đáp án D:</label><input type="text" id="m-optD"></div>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
            <div class="form-group"><label>Đáp án đúng (A,B...):</label><input type="text" id="m-correct"></div>
            <div class="form-group">
                <label>Bậc:</label>
                <select id="m-level">
                    <option value="1/5">1/5</option>
                    <option value="2/5">2/5</option>
                    <option value="3/5">3/5</option>
                    <option value="4/5">4/5</option>
                    <option value="5/5">5/5</option>
                </select>
            </div>
        </div>
        <div class="form-group"><label>Căn cứ:</label><input type="text" id="m-basis"></div>
        <div class="form-group"><label>Trích dẫn:</label><textarea id="m-quote" rows="3"></textarea></div>
        <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
            <button onclick="closeModal()" style="padding:10px 20px; background:#6c757d; color:white; border:none; border-radius:6px; cursor:pointer;">Hủy</button>
            <button id="btn-save-update" style="padding:10px 25px; background:var(--success); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">LƯU THAY ĐỔI</button>
        </div>
    </div>
</div>

<footer><div>Nhóm biên soạn bộ đề An toàn điện VDC @2026</div><div style="font-weight:600; color:var(--primary); margin-top:5px;">Admin: Trần Công Đẹp - 0963.292.882</div></footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyBPNk4J9npcClKFD0daia4W8nPwwg3bX_A", authDomain: "vsiptest-bdbc5.firebaseapp.com", projectId: "vsiptest-bdbc5", storageBucket: "vsiptest-bdbc5.firebasestorage.app", messagingSenderId: "1056019256354", appId: "1:1056019256354:web:8f864b8b2edc4c9b1ca67b", measurementId: "G-42WSD293BH" };
    
    const app = initializeApp(firebaseConfig); 
    const db = getFirestore(app); 
    const auth = getAuth(app);
    const MASTER_ADMIN = "deptc.gvatvsld@gmail.com"; 
    
    let currentQuestions = []; 
    let currentEditDocId = null;

    onAuthStateChanged(auth, (user) => { 
        if (user && user.email === MASTER_ADMIN) loadQuestions(); 
        else window.location.href = '../index.html'; 
    });

    window.loadQuestions = async () => {
        const body = document.getElementById('question-list'); 
        const lvl = document.getElementById('level-filter').value;
        document.getElementById('loading-table').style.display = 'block'; 
        body.innerHTML = '';
        
        try {
            // Logic lọc linh hoạt cho vsiptest
            const q = query(collection(db, "questions"), 
                where("level", "in", [lvl, "Bậc " + lvl, lvl.replace("/5", "")]));
            
            const snap = await getDocs(q);
            currentQuestions = []; 
            snap.forEach(d => currentQuestions.push({ docId: d.id, ...d.data() })); 
            
            // Sắp xếp theo ID số
            currentQuestions.sort((a, b) => parseInt(a.questionId) - parseInt(b.questionId));
            render(currentQuestions);
        } catch (e) { 
            console.error(e);
            body.innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">Lỗi tải dữ liệu: ' + e.message + '</td></tr>'; 
        }
        document.getElementById('loading-table').style.display = 'none';
    };

    function render(data) {
        const body = document.getElementById('question-list'); body.innerHTML = '';
        if(data.length === 0) {
            body.innerHTML = '<tr><td colspan="5" style="text-align:center;">Không tìm thấy câu hỏi nào cho bậc này.</td></tr>';
            return;
        }
        data.forEach(q => { 
            const row = document.createElement('tr'); 
            row.innerHTML = `
                <td><strong>${q.questionId}</strong></td>
                <td><small>${q.level || ''}</small></td>
                <td>${q.content}</td>
                <td style="color:var(--danger)"><b>${q.correctAnswer}</b></td>
                <td style="white-space:nowrap">
                    <button class="btn-edit-small" onclick="openEdit('${q.docId}')">Sửa</button> 
                    <button class="btn-del-small" onclick="deleteQuestion('${q.docId}', '${q.questionId}')">Xóa</button>
                </td>`; 
            body.appendChild(row); 
        });
    }

    window.filterQuestions = () => { 
        const key = document.getElementById('search-input').value.toLowerCase(); 
        const filtered = currentQuestions.filter(q => 
            q.content.toLowerCase().includes(key) || 
            q.questionId.toString().includes(key)
        );
        render(filtered); 
    };

    window.openEdit = (docId) => {
        const q = currentQuestions.find(i => i.docId === docId); 
        if(!q) return;
        currentEditDocId = docId;
        
        document.getElementById('m-id').innerText = q.questionId; 
        document.getElementById('m-content').value = q.content;
        document.getElementById('m-optA').value = q.optionA || ""; 
        document.getElementById('m-optB').value = q.optionB || ""; 
        document.getElementById('m-optC').value = q.optionC || ""; 
        document.getElementById('m-optD').value = q.optionD || "";
        document.getElementById('m-correct').value = q.correctAnswer || ""; 
        
        // Chuẩn hóa Bậc khi hiển thị trong modal
        let cleanLvl = q.level.toString();
        if(!cleanLvl.includes("/5")) cleanLvl += "/5";
        document.getElementById('m-level').value = cleanLvl;
        
        document.getElementById('m-basis').value = q.newBasis || ""; 
        document.getElementById('m-quote').value = q.quote || "";
        document.getElementById('edit-modal').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('edit-modal').style.display = 'none';

    window.deleteQuestion = async (docId, qId) => { 
        if (confirm(`Anh có chắc chắn muốn xóa câu số ${qId} không?`)) { 
            await deleteDoc(doc(db, "questions", docId)); 
            localStorage.removeItem('matrix_cache'); // Xóa cache matrix
            loadQuestions(); 
        } 
    };

    document.getElementById('btn-save-update').onclick = async () => {
        const btn = document.getElementById('btn-save-update');
        btn.disabled = true; btn.innerText = "ĐANG LƯU...";
        
        try {
            await updateDoc(doc(db, "questions", currentEditDocId), { 
                content: document.getElementById('m-content').value, 
                optionA: document.getElementById('m-optA').value, 
                optionB: document.getElementById('m-optB').value, 
                optionC: document.getElementById('m-optC').value, 
                optionD: document.getElementById('m-optD').value, 
                correctAnswer: document.getElementById('m-correct').value.toUpperCase().trim(), 
                level: document.getElementById('m-level').value, 
                newBasis: document.getElementById('m-basis').value, 
                quote: document.getElementById('m-quote').value, 
                updatedAt: new Date().toISOString() 
            });
            localStorage.removeItem('matrix_cache'); // Xóa cache matrix để cập nhật lại số liệu
            alert("Đã cập nhật thành công!");
            closeModal(); 
            loadQuestions();
        } catch (e) {
            alert("Lỗi khi lưu: " + e.message);
        } finally {
            btn.disabled = false; btn.innerText = "LƯU THAY ĐỔI";
        }
    };
</script>
</body>
</html>
