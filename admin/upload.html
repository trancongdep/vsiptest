<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Questions - VSIP 2026 - v3.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --primary: #004a99; --accent: #f37021; --success: #28a745; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--primary); color: white; padding: 25px 15px; text-align: center; position: sticky; top: 0; display: flex; align-items: center; justify-content: center; }
        header h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; flex: 1; }
        .btn-nav { position: absolute; left: 15px; background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 8px 15px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; text-decoration: none; font-weight: 600; }
        .container { flex: 1; max-width: 800px; margin: 30px auto; padding: 0 15px; width: 100%; box-sizing: border-box; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); text-align: center; }
        .upload-zone { border: 3px dashed #ddd; padding: 40px; border-radius: 12px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .upload-zone:hover { border-color: var(--primary); background: #f0f7ff; }
        .btn-upload { background: var(--success); color: white; padding: 15px 40px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        #log { margin-top: 20px; text-align: left; background: #333; color: #0f0; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 0.8rem; max-height: 250px; overflow-y: auto; display: none; }
        footer { background: #eef2f6; padding: 20px; text-align: center; border-top: 3px solid var(--primary); margin-top: auto; }
    </style>
</head>
<body>
<header><a href="index.html" class="btn-nav">« Quản trị</a><h1>TẢI BỘ ĐỀ EXCEL - v3.3</h1></header>
<div class="container">
    <div id="main-content" class="card">
        <h3>Bước 1: Chọn file Excel (.xlsx)</h3>
        <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <p>Nhấn vào đây để chọn file bộ đề</p>
            <input type="file" id="fileInput" accept=".xlsx" style="display:none" onchange="handleFile(this)">
            <strong id="fileName" style="color:var(--primary)"></strong>
        </div>
        <button id="startBtn" class="btn-upload" disabled>BẮT ĐẦU TẢI LÊN</button>
        <div id="log"></div>
    </div>
</div>
<footer><div>Nhóm biên soạn bộ đề An toàn điện VDC @2026</div><div style="font-weight:600; color:var(--primary); margin-top:5px;">Admin: Trần Công Đẹp - 0963.292.882</div></footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyCzWjfcD5Dgq7V-i2izb9tKLR6QM6qWPQo", 
        authDomain: "tavietnam-78ae8.firebaseapp.com", 
        projectId: "tavietnam-78ae8", 
        storageBucket: "tavietnam-78ae8.firebasestorage.app", 
        messagingSenderId: "670121705534", 
        appId: "1:670121705534:web:1027ad98550573ad37116f" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const MASTER_ADMIN = "deptc.gvatvsld@gmail.com";
    let jsonData = [];

    onAuthStateChanged(auth, (user) => { if (!user || user.email !== MASTER_ADMIN) window.location.href = 'index.html'; });

    window.handleFile = (input) => {
        const file = input.files[0]; if (!file) return;
        document.getElementById('fileName').innerText = file.name;
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const raw = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
            jsonData = raw.map(row => {
                const clean = {};
                for (let k in row) clean[k.toLowerCase().trim()] = row[k];
                return clean;
            });
            document.getElementById('startBtn').disabled = false;
        };
        reader.readAsArrayBuffer(file);
    };

    document.getElementById('startBtn').onclick = async () => {
        const log = document.getElementById('log'); log.style.display = 'block'; log.innerHTML = 'Đang tải lên...<br>';
        let count = 0;
        for (let item of jsonData) {
            try {
                const id = (item['câu số'] || item['stt'] || "").toString().trim();
                if (!id) continue;
                const mapped = {
                    questionId: id,
                    category: (item['phân nhóm'] || item['chuyên đề'] || "").toString().trim(),
                    level: (item['bậc at'] || "").toString().trim(),
                    content: (item['nội dung'] || "").toString().trim(),
                    optionA: (item['a'] || "").toString().trim(),
                    optionB: (item['b'] || "").toString().trim(),
                    optionC: (item['c'] || "").toString().trim(),
                    optionD: (item['d'] || "").toString().trim(),
                    correctAnswer: (item['đáp án đúng'] || "").toString().toUpperCase().trim(),
                    newBasis: (item['căn cứ mới cập nhật'] || "").toString().trim(),
                    quote: (item['trích dẫn'] || "").toString().trim(),
                    updatedAt: new Date().toISOString()
                };
                await setDoc(doc(db, "questions", id), mapped, { merge: true });
                count++;
                log.innerHTML += `✅ Câu ${id}<br>`;
                log.scrollTop = log.scrollHeight;
            } catch (e) { log.innerHTML += `❌ Lỗi: ${e.message}<br>`; }
        }
        alert(`Thành công ${count} câu!`);
    };
</script>
</body>
</html>
